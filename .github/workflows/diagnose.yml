name: Diagnose DOM
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to diagnose'
        required: true
        default: 'https://www.clubmontmartre-paris.com/'
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Installation des dépendances
        run: npm install
      - name: Lancement du diagnostic
        env:
          DIAGNOSE_URL: ${{ github.event.inputs.url }}
        run: node diagnose.js
