name: Scrape Jackpots

on:
  schedule:
    - cron: '0 */2 * * *'   # Toutes les 2h (économise les minutes gratuites)
  workflow_dispatch:          # Bouton "Run workflow" manuel dans l'interface GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: npm install

      - name: Lancement du scraping
        env:
          DATA_DIR: '.'
        run: node scraper.js

      - name: Commit et push de latest.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest.json
          git diff --staged --quiet || git commit -m "snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
